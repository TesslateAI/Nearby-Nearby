services:
  # --- MINIO S3 STORAGE ---
  minio:
    image: minio/minio:latest
    container_name: nearby-minio
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # --- DEVELOPMENT SERVICES ---
  db:
    # Custom PostGIS image with pgvector (see db/Dockerfile) so local dev can run
    # real semantic search, mirroring prod RDS. Replaces the stock
    # postgis/postgis:15-3.4 image; same base tag keeps the postgres_data volume
    # / PG15 catalog compatible.
    build:
      context: ./db
      dockerfile: Dockerfile
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- EMBEDDING SERVICE ---
  # LOCAL dev uses Docker Model Runner (DMR), NOT a compose service. DMR is built
  # into Docker Desktop, runs `ai/embeddinggemma` on the host with Metal GPU, and
  # is reachable from every container at http://model-runner.docker.internal/engines/v1
  # (OpenAI-compatible). Setup once:  docker model pull ai/embeddinggemma
  # We deliberately do NOT run the HF TEI image locally: it is amd64-only and its
  # Intel-MKL CPU kernels segfault under emulation on Apple Silicon. PROD serves
  # TEI in an amd64 Fargate container (EMBEDDING_BACKEND=tei) — see terraform/ and
  # docs/systems/search.md. The backends point at DMR via the env vars below and
  # are fail-soft (keyword search if the embedding server is unreachable).

  backend:
    container_name: nearby-admin-backend
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - ../shared:/app/shared
      - image_storage:/app/storage/images
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - ENVIRONMENT=${ENVIRONMENT}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - PRODUCTION_DOMAIN=${PRODUCTION_DOMAIN}
      - IMAGE_STORAGE_PATH=/app/storage/images
      - IMAGE_BASE_URL=/api/images
      - PYTHONPATH=/app
      # Embed-on-write via Docker Model Runner (see the EMBEDDING SERVICE note
      # above). Fail-soft: if DMR is unreachable the client is disabled and
      # writes still succeed without an embedding. Override/unset to disable.
      - EMBEDDING_BACKEND=${EMBEDDING_BACKEND:-openai}
      - EMBEDDING_SERVICE_URL=${EMBEDDING_SERVICE_URL:-http://model-runner.docker.internal/engines/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-ai/embeddinggemma}
      - EMBEDDING_TIMEOUT=${EMBEDDING_TIMEOUT:-60}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    container_name: nearby-admin-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5176:5173"
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    depends_on:
      - backend

  # --- TESTING SERVICES ---
  test-db:
    image: postgis/postgis:15-3.4
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${TEST_POSTGRES_USER}
      - POSTGRES_PASSWORD=${TEST_POSTGRES_PASSWORD}
      - POSTGRES_DB=${TEST_POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_POSTGRES_USER} -d ${TEST_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports or volumes needed, it's only for internal use

  test:
    build: ./backend
    command: ["pytest"]
    volumes:
      - ./backend:/app
      - ../shared:/app/shared
    env_file:
      - .env
    environment:
      - DATABASE_URL=${TEST_DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - TESTING=true
      - PYTHONPATH=/app
    depends_on:
      test-db:
        condition: service_healthy

volumes:
  postgres_data:
  image_storage:
  minio_data:

networks:
  default:
    name: nearby-admin_default
