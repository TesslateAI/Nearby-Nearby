name: Deploy nearby-app to AWS ECR/ECS

on:
  push:
    branches: [ "main" ]
    paths:
      - 'nearby-app/**'
      - 'shared/**'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip integration tests'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write   # for GitHub OIDC to assume AWS role
  contents: read

concurrency:
  group: deploy-app-main
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: nearbynearby/nearby-app
  ECS_CLUSTER: nearbynearby-prod
  ECS_SERVICE: nearbynearby-prod-app

jobs:
  test:
    if: ${{ github.event_name == 'push' || !inputs.skip_tests }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The stock postgis/postgis image has no pgvector, but the embedding
      # pipeline tests require "CREATE EXTENSION vector". We build the project's
      # own pgvector-enabled test DB image (tests/Dockerfile.testdb = PostGIS 15
      # + postgresql-15-pgvector) via docker compose instead of a services: block.
      - name: Start test database (PostGIS + pgvector)
        run: docker compose -f tests/docker-compose.test.yml up -d --build test-db

      - name: Wait for test database to be healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format '{{.State.Health.Status}}' tests-test-db-1 2>/dev/null || echo "starting")
            echo "test-db health: $status (attempt $i/30)"
            if [ "$status" = "healthy" ]; then
              echo "test-db is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "test-db did not become healthy in time"
          docker compose -f tests/docker-compose.test.yml logs test-db
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r nearby-app/backend/requirements.txt
          pip install -r nearby-admin/backend/requirements.txt
          pip install pytest pytest-httpx httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5434/test_nearby
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short -x

  build-and-deploy:
    needs: test
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nearby-app/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache,mode=max

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --force-new-deployment
