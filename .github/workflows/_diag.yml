name: Prod diagnostic (throwaway)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Task definition (look for image tag + secret refs)
        shell: bash
        run: |
          set +e
          echo "::group::current task def for admin service"
          TD_ARN=$(aws ecs describe-services --cluster nearbynearby-prod --services nearbynearby-prod-admin --query 'services[0].taskDefinition' --output text)
          echo "taskDefinition: $TD_ARN"
          aws ecs describe-task-definition --task-definition "$TD_ARN" \
            --query 'taskDefinition.{family:family,revision:revision,cpu:cpu,memory:memory,containers:containerDefinitions[].{name:name,image:image,essential:essential,env:environment,secrets:secrets,logConfiguration:logConfiguration}}' || true
          echo "::endgroup::"

      - name: Latest admin backend image in ECR
        shell: bash
        run: |
          set +e
          echo "::group::ECR images for admin backend (last 5)"
          aws ecr describe-images --repository-name nearbynearby/nearby-admin-backend \
            --query 'reverse(sort_by(imageDetails,&imagePushedAt))[:5].{pushedAt:imagePushedAt,tags:imageTags,sizeMB:to_string(imageSizeInBytes)}' || true
          echo "::endgroup::"

      - name: Describe failing tasks from service events
        shell: bash
        run: |
          set +e
          echo "::group::extract task ids from recent service events"
          EVENTS=$(aws ecs describe-services --cluster nearbynearby-prod --services nearbynearby-prod-admin --query 'services[0].events[0:25]' --output json)
          echo "$EVENTS" | grep -oE 'task [a-f0-9]{32}' | awk '{print $2}' | sort -u | head -6 > /tmp/tasks.txt
          cat /tmp/tasks.txt
          echo "::endgroup::"

          for t in $(cat /tmp/tasks.txt); do
            echo "::group::task $t"
            aws ecs describe-tasks --cluster nearbynearby-prod --tasks "$t" \
              --query 'tasks[0].{taskArn:taskArn,lastStatus:lastStatus,stoppedReason:stoppedReason,stopCode:stopCode,startedAt:startedAt,stoppingAt:stoppingAt,stoppedAt:stoppedAt,containers:containers[].{name:name,lastStatus:lastStatus,reason:reason,exitCode:exitCode,healthStatus:healthStatus}}' 2>&1 || true
            echo "::endgroup::"
          done

      - name: CloudWatch logs (admin log group)
        shell: bash
        run: |
          set +e
          echo "::group::list log streams in /ecs/nearbynearby-prod/admin"
          aws logs describe-log-streams --log-group-name '/ecs/nearbynearby-prod/admin' \
            --order-by LastEventTime --descending --max-items 8 \
            --query 'logStreams[].{name:logStreamName,lastEvent:lastEventTimestamp}' 2>&1 || true
          echo "::endgroup::"

          echo "::group::tail admin logs (last 30m)"
          aws logs tail '/ecs/nearbynearby-prod/admin' --since 30m --format short 2>&1 | tail -300 || true
          echo "::endgroup::"

      - name: Stopped tasks list (direct query)
        shell: bash
        run: |
          set +e
          echo "::group::list stopped tasks"
          aws ecs list-tasks --cluster nearbynearby-prod --service-name nearbynearby-prod-admin --desired-status STOPPED --max-results 10 2>&1 || true
          echo "::endgroup::"
